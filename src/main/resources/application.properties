spring.application.name=ticketBooking
spring.datasource.url=jdbc:postgresql://localhost:5432/ticket_booking
spring.datasource.username=postgres
spring.datasource.password=admin
logging.level.org.springframework.security=DEBUG
spring.jpa.hibernate.ddl-auto=update

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.acknowledge-mode=manual

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
jwt.secret=thisIsVerySecretKeyForJwtAuthenticationThisIsVerySecretKey
jwt.expiration=3600000

ticket.expiry.scheduler-rate=60000